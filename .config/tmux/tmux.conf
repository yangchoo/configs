# Enable True Color and RGB support for Ghostty
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:RGB"

# Allow 'passthrough' sequences
# This allows Claude Code to send notifications directly to Ghostty/macOS
set -g allow-passthrough on

# Enable Focus Events
# This tells Ghostty when you've switched panes, which helps with 
# the "notify when command finishes" logic.
set -g focus-events on

# Modern Bell handling
# This ensures that when a process pings, Ghostty sees it.
set -g visual-bell on
set -g bell-action any

# This tells tmux: "When I copy something, send it to the terminal via OSC 52"
set -g set-clipboard on

# Replicate tmux-yank's 'y' behavior
# This makes 'y' in copy-mode copy to the system clipboard and exit copy-mode
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel

# Mouse Support
# This makes mouse-drags automatically copy to the system clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel


# Remap prefix to ctrl-a
set -g prefix C-a
unbind C-b

# Emacs line navigation
bind a send-prefix      # start of line

# Set zsh as default shell
set-option -g default-shell /bin/zsh

# Set colors for Vim
set -g default-terminal "tmux-256color"

# Toggle mouse on
bind-key M \
  set-option -g mouse on \;\
  display-message 'Mouse: ON'

# Toggle mouse off
bind-key m \
  set-option -g mouse off \;\
  display-message 'Mouse: OFF'

# activity
set -g monitor-activity on
set -g visual-activity off

# Remap split keybind - Use current path whenever possible
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -v -c "#{pane_current_path}"

# Remap new window to use current path 
bind c new-window -c "#{pane_current_path}"

# Line limit
set-option -g history-limit 50000

# Lower repeat time for easier navigation, tradeoff
set-option -g repeat-time 250  # default 500ms

# Get tmux version for syntax compat
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

# 1. Enable OSC 52 clipboard support (Ghostty supports this natively)
set -g set-clipboard on

# 2. Use 'v' and 'y' in copy-mode (Vim-style)
# We no longer need 'copy-pipe xclip' because set-clipboard handles it
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel

# Tmux Navigator with fzf key bindings
# see: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
| grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# From https://github.com/gpakosz/.tmux
## -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-interval 10     # redraw status line every 10 seconds

# Theme - Tomorrow Night
# see: https://github.com/mattdavis90/base16-tmux/blob/master/colors/base16-tomorrow-night.conf

# COLOUR (base16)

# default statusbar colors
set-option -g status-style "fg=#b4b7b4,bg=#282a2e"

# default window title colors
set-window-option -g window-status-style "fg=#b4b7b4,bg=default"

# active window title colors
set-window-option -g window-status-current-style "fg=#f0c674,bg=default"

# pane border
set-option -g pane-border-style "fg=#282a2e"
set-option -g pane-active-border-style "fg=#373b41"

# message text
set-option -g message-style "fg=#c5c8c6,bg=#282a2e"

# pane number display
set-option -g display-panes-active-colour "#b5bd68"
set-option -g display-panes-colour "#f0c674"

# clock
set-window-option -g clock-mode-colour "#b5bd68"

# copy mode highligh
set-window-option -g mode-style "fg=#b4b7b4,bg=#373b41"

# bell
set-window-option -g window-status-bell-style "fg=#282a2e,bg=#cc6666"

# Use vim mode keys
setw -g mode-keys vi

## Neovim checkhealth recommendations
# Reduce default tmux escape wait time check from 500ms 
set-option -sg escape-time 10
# Enable focus-events for autoread to work
set-option -g focus-events on

# List of TPM Plugins
# Assumes git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

