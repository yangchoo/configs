# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = true

# Set a command timeout of 2 seconds
command_timeout = 2000

# Format the entire prompt
# Line 1: [Directory] [Git Branch] [Git Status] -> Right aligned: [Cmd Duration] [Jobs] [Status] etc.
# Line 2: [Character]
format = """$directory$git_branch$git_status$line_break$character"""
right_format = """$all"""

[directory]
style = "blue"

[directory.substitutions]
"Documents" = "´£ÿ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vicmd_symbol = "[ÔØ«](bold green)"

# --- Git ---
# [git_branch]
# symbol = "´äª"
# style = "yellow"
# format = " [$symbol $branch]($style)"
# 
# [git_commit]
# style = "bg:#DA627D"
# commit_hash_length = 8
# format = "[[commit ($hash)](fg:#000000)]($style)"
# only_detached = true

# [git_state]
# style = "bg:#FCA17D"
# format = '[\(state( $progress_current of $progress_total)\)]($style)'

[git_status]
# style = "yellow"
format = '([$staged$modified$untracked]($style))'
staged = " +${count}"
modified = " !${count}"
untracked = " ?${count}"

# --- Language & Tool Modules (mimicking p10k right prompt) ---

